<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta http-equiv="refresh" content="60">

<title>Kindle Clock</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #fff;
    color: #000;
    font-family: serif;
}

.container {
    height: 100%;
    display: table;
    width: 100%;
    text-align: center;
}

.content {
    display: table-cell;
    vertical-align: middle;
}

#time {
    font-size: 72px;
    font-weight: bold;
    margin-bottom: 20px;
}

#date {
    font-size: 32px;
}
</style>
</head>

<body>
<div class="container">
    <div class="content">
        <div id="time">--:--</div>
        <div id="date">--</div>
    </div>
</div>

<script>
function updateClock() {
    const now = new Date();

    const time = now.toLocaleTimeString('pt-BR', {
        timeZone: 'America/Sao_Paulo',
        hour: '2-digit',
        minute: '2-digit'
    });

    const date = now.toLocaleDateString('pt-BR', {
        timeZone: 'America/Sao_Paulo',
        weekday: 'long',
        day: '2-digit',
        month: 'long',
        year: 'numeric'
    });

    document.getElementById('time').textContent = time;
    document.getElementById('date').textContent = date;
}

updateClock();
setInterval(updateClock, 1000);
</script>
</body>
</html>
